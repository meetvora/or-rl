---
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solving OR Problems With Small Language Models</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --paper: #ffffff;
        --text: #1f2328;
        --muted: #5b6472;
        --border: #e6e8eb;
        --accent: #1663c7;
        --code-bg: #f6f8fa;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      main {
        max-width: 1240px;
        margin: 56px auto;
        padding: 0 72px 48px;
        background: var(--paper);
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        padding: 0 0 20px;
        margin-bottom: 28px;
        border-bottom: 1px solid var(--border);
      }

      .page-title {
        min-width: 0;
      }

      .page-title h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        letter-spacing: -0.04em;
      }

      .page-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .page-links {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        padding-top: 6px;
        white-space: nowrap;
      }

      .page-links a {
        color: var(--accent);
        text-decoration-thickness: 1px;
        text-underline-offset: 2px;
      }

      .markdown-body {
        max-width: 100%;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        line-height: 1.2;
        margin-top: 1.7em;
        margin-bottom: 0.6em;
      }

      .markdown-body h1 {
        font-size: clamp(2rem, 5vw, 3.1rem);
        margin-top: 0;
        display: none;
      }

      .markdown-body h2 {
        font-size: 1.7rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.3em;
      }

      .markdown-body h3 {
        font-size: 1.25rem;
      }

      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body table,
      .markdown-body pre {
        margin-top: 0.95em;
        margin-bottom: 0.95em;
      }

      .markdown-body a {
        color: var(--accent);
        text-decoration-thickness: 1px;
        text-underline-offset: 2px;
      }

      .markdown-body a:hover {
        text-decoration-thickness: 2px;
      }

      .markdown-body img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1.2em auto;
        border-radius: 14px;
      }

      .markdown-body table {
        width: auto;
        max-width: 100%;
        border-collapse: collapse;
        margin: 1.2em auto;
        display: table;
        overflow-x: auto;
      }

      .markdown-body th,
      .markdown-body td {
        border: 1px solid var(--border);
        padding: 0.6rem 0.75rem;
        vertical-align: top;
      }

      .markdown-body th {
        background: #f4efe6;
        text-align: left;
      }

      .markdown-body blockquote {
        margin-left: 0;
        padding: 0.2rem 1rem;
        border-left: 4px solid rgba(22, 99, 199, 0.25);
        background: #f8fbff;
        border-radius: 0 10px 10px 0;
        color: var(--muted);
      }

      .markdown-body code {
        padding: 0.15em 0.35em;
        border-radius: 6px;
        background: var(--code-bg);
        font-size: 0.95em;
      }

      .markdown-body pre {
        padding: 1rem 1.1rem;
        overflow: auto;
        border-radius: 14px;
        background: #f6f8fa;
        border: 1px solid var(--border);
      }

      .markdown-body pre code {
        padding: 0;
        background: transparent;
      }

      .markdown-body hr {
        margin: 2rem 0;
        border: 0;
        border-top: 1px solid var(--border);
      }

      .mermaid {
        display: flex;
        justify-content: center;
        overflow-x: auto;
        margin: 1.4em 0;
      }

      .mermaid svg {
        max-width: 100%;
      }

      @media (max-width: 720px) {
        main {
          margin: 0;
          padding: 0 18px 36px;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .page-links {
          padding-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page-header">
        <div class="page-title">
          <h1>Solving OR Problems With Small Language Models</h1>
          <div class="page-meta">meetvora, published 2026-05-29</div>
        </div>
        <div class="page-links">
          <a href="https://github.com/meetvora/or-rl" target="_blank" rel="noopener noreferrer">Repo</a>
        </div>
      </header>

      <div class="markdown-body">
        {% capture readme %}{% include_relative README.md %}{% endcapture %}
        {{ readme | markdownify }}
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      (function () {
        if (!window.mermaid) {
          return;
        }

        mermaid.initialize({ startOnLoad: false, theme: "default" });

        document.querySelectorAll("pre > code.language-mermaid").forEach(function (block) {
          var container = document.createElement("div");
          container.className = "mermaid";
          container.textContent = block.textContent;
          block.parentElement.replaceWith(container);
        });

        mermaid.run({ querySelector: ".mermaid" });
      })();
    </script>
  </body>
</html>
