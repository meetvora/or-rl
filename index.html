---
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solving OR Problems With Small Language Models</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f2eb;
        --paper: #fffaf2;
        --text: #1f2328;
        --muted: #5b6472;
        --border: #d8d2c7;
        --accent: #8a5a2b;
        --code-bg: #f3ede2;
        --shadow: 0 18px 60px rgba(40, 27, 12, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(138, 90, 43, 0.08), transparent 32%),
          radial-gradient(circle at top right, rgba(31, 35, 40, 0.05), transparent 28%),
          var(--bg);
        color: var(--text);
        font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      main {
        max-width: 1100px;
        margin: 40px auto;
        padding: 36px 40px 52px;
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
      }

      .markdown-body {
        max-width: 100%;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        line-height: 1.2;
        margin-top: 1.7em;
        margin-bottom: 0.6em;
      }

      .markdown-body h1 {
        font-size: clamp(2rem, 5vw, 3.1rem);
        margin-top: 0;
        letter-spacing: -0.04em;
      }

      .markdown-body h2 {
        font-size: 1.7rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.3em;
      }

      .markdown-body h3 {
        font-size: 1.25rem;
      }

      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body table,
      .markdown-body pre {
        margin-top: 0.95em;
        margin-bottom: 0.95em;
      }

      .markdown-body a {
        color: var(--accent);
        text-decoration-thickness: 1px;
        text-underline-offset: 2px;
      }

      .markdown-body a:hover {
        text-decoration-thickness: 2px;
      }

      .markdown-body img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1.2em auto;
        border-radius: 14px;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
      }

      .markdown-body th,
      .markdown-body td {
        border: 1px solid var(--border);
        padding: 0.6rem 0.75rem;
        vertical-align: top;
      }

      .markdown-body th {
        background: #f4efe6;
        text-align: left;
      }

      .markdown-body blockquote {
        margin-left: 0;
        padding: 0.2rem 1rem;
        border-left: 4px solid rgba(138, 90, 43, 0.35);
        background: rgba(138, 90, 43, 0.06);
        border-radius: 0 10px 10px 0;
        color: var(--muted);
      }

      .markdown-body code {
        padding: 0.15em 0.35em;
        border-radius: 6px;
        background: var(--code-bg);
        font-size: 0.95em;
      }

      .markdown-body pre {
        padding: 1rem 1.1rem;
        overflow: auto;
        border-radius: 14px;
        background: #f8f5ef;
        border: 1px solid var(--border);
      }

      .markdown-body pre code {
        padding: 0;
        background: transparent;
      }

      .markdown-body hr {
        margin: 2rem 0;
        border: 0;
        border-top: 1px solid var(--border);
      }

      .mermaid {
        overflow-x: auto;
      }

      @media (max-width: 720px) {
        main {
          margin: 0;
          border-radius: 0;
          padding: 24px 18px 36px;
        }
      }
    </style>
  </head>
  <body>
    <main class="markdown-body">
      {% capture readme %}{% include_relative README.md %}{% endcapture %}
      {{ readme | markdownify }}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      (function () {
        if (!window.mermaid) {
          return;
        }

        mermaid.initialize({ startOnLoad: false, theme: "default" });

        document.querySelectorAll("pre > code.language-mermaid").forEach(function (block) {
          var container = document.createElement("div");
          container.className = "mermaid";
          container.textContent = block.textContent;
          block.parentElement.replaceWith(container);
        });

        mermaid.run({ querySelector: ".mermaid" });
      })();
    </script>
  </body>
</html>
